<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/signup.css" />
    <title>Create Account | MyShop-Pay</title>
  </head>
  <body>

    <div class="signup-container">
      <div class="signup-header">
        <div class="signup-title">
          <span class="signup-icon"></span>
          <h1>Create Account</h1>
        </div>
        <p class="signup-subtitle">Join us and start shopping today</p>
      </div>

      <div class="signup-card">
        <form id="signup-form">
          <div class="form-group">
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" class="input" placeholder="Ariane M. Polo" />
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="username" class="input" placeholder="hello@example.com" />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="input" placeholder="••••••" />
            <small class="password-hint">Must be at least 8 characters</small>
          </div>

          <div class="form-group">
            <label for="role">Account type</label>
            <select id="role" class="input" required>
              <option value="USER">Shopper</option>
              <option value="SELLER">Seller</option>
              <option value="ADMIN">Admin</option>
            </select>
          </div>

          <div class="checkbox-group">
            <label class="checkbox-label">
              <input type="checkbox" id="terms-checkbox" />
              <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
            </label>
          </div>

          <button type="submit" class="signup-btn" id="sg-btn">Create Account</button>

          <div class="login-link">
            <p>Already have an account? <a href="login.html">Log in</a></p>
          </div>
        </form>
      </div>

      <div class="signup-benefits">
        <h3>Why join us?</h3>
        <ul>
          <li>✓ Exclusive member discounts</li>
          <li>✓ Track orders & view history</li>
          <li>✓ Faster checkout process</li>
          <li>✓ Save items to wishlist</li>
        </ul>
      </div>
    </div>

    <script src="script.js"></script>
    <script>
      (function() {
        const signupForm = document.getElementById('signup-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const roleInput = document.getElementById('role');
        const termsCheckbox = document.getElementById('terms-checkbox');

        const errorMessage = document.createElement('div');
        errorMessage.className = 'field-error';
        errorMessage.style.margin = '0 0 1rem';
        signupForm.insertBefore(errorMessage, signupForm.firstChild);

        function showError(message) {
          errorMessage.textContent = message;
        }

        function clearError() {
          errorMessage.textContent = '';
        }

        async function registerUser(event) {
          event.preventDefault();
          clearError();

          const email = emailInput.value.trim();
          const password = passwordInput.value;
          const role = roleInput.value;

          if (!email) {
            showError('Email is required.');
            return;
          }

          if (!password || password.length < 8) {
            showError('Password must be at least 8 characters.');
            return;
          }

          if (!termsCheckbox.checked) {
            showError('You must agree to the Terms of Service and Privacy Policy.');
            return;
          }

          try {
            const response = await fetch('/api/v1/auth/register', {
              method: 'POST',
              credentials: 'same-origin',
              headers: {
                'Content-Type': 'application/json',
                'Accept': 'application/json'
              },
              body: JSON.stringify({
                username: email,
                password: password,
                role: role
              })
            });

            if (response.status === 201) {
              window.location.href = 'login.html';
              return;
            }

            const body = await response.json().catch(function() { return {}; });
            var errorMessageValue = body && body.message;
            if (!errorMessageValue && body && Array.isArray(body.errors)) {
              errorMessageValue = body.errors.map(function(err) { return err.message; }).join(' ');
            }
            if (!errorMessageValue) {
              errorMessageValue = 'Unable to create account. (' + response.status + ')';
            }
            console.error('Registration failed:', response.status, body);
            showError(errorMessageValue);
          } catch (error) {
            showError('Unable to register. Check your network connection and try again.');
          }
        }

        signupForm.addEventListener('submit', registerUser);
      })();
    </script>
  </body>
</html>
